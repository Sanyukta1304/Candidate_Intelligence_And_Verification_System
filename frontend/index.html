<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CredVerify - Candidate Intelligence & Verification System</title>
  <script>
    // Prevent flash of unstyled content by applying theme before React renders
    (function () {
      try {
        const theme = localStorage.getItem('theme') || 'light';
        const html = document.documentElement;
        if (html) {
          html.setAttribute('data-theme', theme);
          html.className = theme === 'dark' ? 'dark-theme' : 'light-theme';
        }
      } catch (e) {
        console.warn('Error initializing theme:', e);
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
